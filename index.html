<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Text to Speech</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #16213e;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #8ab4f8;
      font-size: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #a0a0c0;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #8ab4f8;
    }
    textarea {
      resize: vertical;
      min-height: 120px;
      font-family: inherit;
    }
    .field { margin-bottom: 16px; }
    .row {
      display: flex;
      gap: 12px;
    }
    .row .field { flex: 1; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #8ab4f8;
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #aecbfa; }
    button:disabled {
      background: #3a3a5a;
      color: #6a6a8a;
      cursor: not-allowed;
    }
    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 0.9rem;
      color: #a0a0c0;
      min-height: 1.2em;
    }
    .status.error { color: #f28b82; }
    .result {
      margin-top: 20px;
      display: none;
      text-align: center;
    }
    .result audio {
      width: 100%;
      margin-bottom: 12px;
    }
    .download-btn {
      display: inline-block;
      padding: 10px 24px;
      background: #34a853;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      width: auto;
    }
    .download-btn:hover { background: #2d9249; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #8ab4f8;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gemini Text to Speech</h1>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your Gemini API key">
    </div>

    <div class="row">
      <div class="field">
        <label for="model">Model</label>
        <select id="model">
          <option value="gemini-2.5-flash-preview-tts">Flash (faster)</option>
          <option value="gemini-2.5-pro-preview-tts">Pro (higher quality)</option>
        </select>
      </div>
      <div class="field">
        <label for="voice">Voice</label>
        <select id="voice">
          <option>Zephyr</option>
          <option>Puck</option>
          <option>Charon</option>
          <option selected>Kore</option>
          <option>Fenrir</option>
          <option>Leda</option>
          <option>Orus</option>
          <option>Aoede</option>
          <option>Callirrhoe</option>
          <option>Autonoe</option>
          <option>Enceladus</option>
          <option>Iapetus</option>
          <option>Umbriel</option>
          <option>Algieba</option>
          <option>Despina</option>
          <option>Erinome</option>
          <option>Algenib</option>
          <option>Rasalgethi</option>
          <option>Laomedeia</option>
          <option>Achernar</option>
          <option>Alnilam</option>
          <option>Schedar</option>
          <option>Gacrux</option>
          <option>Pulcherrima</option>
          <option>Achird</option>
          <option>Zubenelgenubi</option>
          <option>Vindemiatrix</option>
          <option>Sadachbia</option>
          <option>Sadaltager</option>
          <option>Sulafat</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="text">Text</label>
      <textarea id="text" placeholder="Enter text to convert to speech...">Hello, my name is Gemini. How can I help you today?</textarea>
    </div>

    <button id="generateBtn" onclick="generate()">Generate Speech</button>

    <div class="status" id="status"></div>

    <div class="result" id="result">
      <audio id="audio" controls></audio>
      <br>
      <a id="downloadLink" class="download-btn" download="speech.wav">Download WAV</a>
    </div>
  </div>

  <script>
    // Persist API key in localStorage
    const apiKeyInput = document.getElementById('apiKey');
    apiKeyInput.value = localStorage.getItem('gemini_api_key') || '';
    apiKeyInput.addEventListener('change', () => {
      localStorage.setItem('gemini_api_key', apiKeyInput.value);
    });

    function setStatus(msg, isError) {
      const el = document.getElementById('status');
      el.className = 'status' + (isError ? ' error' : '');
      el.innerHTML = msg;
    }

    function createWavBlob(pcmData, sampleRate, numChannels, bitsPerSample) {
      const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
      const blockAlign = numChannels * (bitsPerSample / 8);
      const dataSize = pcmData.byteLength;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      function writeString(offset, str) {
        for (let i = 0; i < str.length; i++) {
          view.setUint8(offset + i, str.charCodeAt(i));
        }
      }

      writeString(0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);           // fmt chunk size
      view.setUint16(20, 1, true);            // PCM format
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitsPerSample, true);
      writeString(36, 'data');
      view.setUint32(40, dataSize, true);

      new Uint8Array(buffer, 44).set(new Uint8Array(pcmData));

      return new Blob([buffer], { type: 'audio/wav' });
    }

    async function generate() {
      const apiKey = apiKeyInput.value.trim();
      const model = document.getElementById('model').value;
      const voice = document.getElementById('voice').value;
      const text = document.getElementById('text').value.trim();
      const btn = document.getElementById('generateBtn');

      if (!apiKey) { setStatus('Please enter your API key.', true); return; }
      if (!text) { setStatus('Please enter some text.', true); return; }

      btn.disabled = true;
      document.getElementById('result').style.display = 'none';
      setStatus('<span class="spinner"></span> Generating audio...', false);

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

        const body = {
          contents: [{ parts: [{ text: text }] }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: {
                  voiceName: voice
                }
              }
            }
          }
        };

        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        const audioPart = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;

        if (!audioPart?.data) {
          throw new Error('No audio data in response.');
        }

        // Decode base64 to raw PCM bytes
        const raw = atob(audioPart.data);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) {
          bytes[i] = raw.charCodeAt(i);
        }

        // Build WAV: 24kHz, mono, 16-bit PCM
        const wavBlob = createWavBlob(bytes.buffer, 24000, 1, 16);
        const wavUrl = URL.createObjectURL(wavBlob);

        const audioEl = document.getElementById('audio');
        audioEl.src = wavUrl;

        const downloadLink = document.getElementById('downloadLink');
        downloadLink.href = wavUrl;

        document.getElementById('result').style.display = 'block';
        setStatus('Done!', false);
      } catch (e) {
        setStatus(e.message, true);
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
